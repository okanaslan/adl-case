services:
    postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: incidents
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres -d incidents"]
            interval: 5s
            timeout: 3s
            retries: 20

    postgres_test:
        profiles: ["test"]
        image: postgres:16-alpine
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: incidents_test
        ports:
            - "5433:5432"
        volumes:
            - postgres_test_data:/var/lib/postgresql/data

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
            target: dev
        environment:
            NODE_ENV: development
            PORT: "3000"
            DATABASE_URL: postgresql://postgres:postgres@postgres:5432/incidents
            CORS_ORIGIN: http://localhost:5173
        depends_on:
            postgres:
                condition: service_healthy
        ports:
            - "3000:3000"
        command: ["sh", "-lc", "npm run migration:run && npm run start:dev"]
        volumes:
            - ./backend:/app
            - /app/node_modules

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
            target: dev
        environment:
            VITE_API_URL: http://localhost:3000
        depends_on:
            - backend
        ports:
            - "5173:5173"
        volumes:
            - ./frontend:/app
            - /app/node_modules

volumes:
    postgres_data:
    postgres_test_data:
